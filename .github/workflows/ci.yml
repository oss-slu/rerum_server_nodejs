name: RERUM CI

on:
  push:
  pull_request:

concurrency:
  group: rerum-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test RERUM Server
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Verify Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run RERUM test suite
        run: npm run runtest

  package-validation:
    name: Validate npm package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build npm package tarball
        run: npm pack

      - name: Display packaged files
        run: |
          PACKAGE_FILE=$(ls *.tgz | head -n 1)
          echo "Generated package: $PACKAGE_FILE"
          tar -tf "$PACKAGE_FILE"

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rerum-npm-package
          path: "*.tgz"